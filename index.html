<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Biblioteca</title>

  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Lato:wght@400;700&display=swap"
    rel="stylesheet" />

  <!-- CSS externo -->
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <!-- NAVBAR -->
  <header>
    <div class="logo">
      <img src="images/unifecaf_logo.png" alt="Logo da Biblioteca">
    </div>

    <!-- CHECKBOX CONTROLE -->
    <input type="checkbox" id="menu-toggle">

    <!-- HAMBURGER SVG -->
    <label for="menu-toggle" class="hamburger">
      <svg viewBox="0 0 32 32">
        <path
          class="line line-top-bottom"
          d="M27 10 13 10C10.8 10 9 8.2 9 6 9 3.5 10.8 2 13 2 15.2 2 17 3.8 17 6L17 26C17 28.2 18.8 30 21 30 23.2 30 25 28.2 25 26 25 23.8 23.2 22 21 22L7 22">
        </path>
        <path class="line" d="M7 16 27 16"></path>
      </svg>
    </label>

    <nav>
      <a href="#" class="active">Biblioteca</a>
      <a href="#">Livros</a>
      <a href="#">Unidades</a>
      <a href="#">Contatos</a>
    </nav>
  </header>

  <!-- BANNER -->
  <main class="hero">
    <img src="images/banner.jpg" alt="Imagem Banner">
  </main>

  <!-- FOOTER -->
  <footer>
    <p>© 2026 Biblioteca Digital</p>
  </footer>

</body>
</html>
